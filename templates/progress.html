<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing... | PDF → Audiobook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <header class="hero" style="min-height: 40vh;">
        <div class="hero-overlay"></div>
        <div class="container hero-content text-center">
            <h1 class="display-4 fw-bold mb-3">Converting Your PDF</h1>
            <p class="lead mb-4">Our AI voice engine is currently narrating your document. Please stay on this page.</p>
        </div>
    </header>

    <section class="upload-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="upload-card shadow-lg text-center p-5">
                        <div id="loadingSpinner" class="mb-4">
                            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>

                        <h3 class="mb-3">Generating Audiobook</h3>

                        <div class="progress mb-3" style="height: 12px;">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                                 role="progressbar" style="width: 100%"></div>
                        </div>

                         </p>
                          <p class="text-muted small mb-0" id="statusLabel">
                            <i class="fa-solid fa-microchip me-2"></i> Initializing CLI Engine...
                 </div>
                </div>
            </div>
        </div>
    </section>


    <!-- FOOTER -->
    <footer class="border-top footer">

<div class="container px-4 px-lg-5">

<div class="row gx-4 gx-lg-5 justify-content-center">

<div class="col-md-10 col-lg-8 col-xl-7">

<ul class="list-inline text-center">

<li class="list-inline-item">

<a href="https://x.com/legophil101" target="_blank" rel="noopener noreferrer">

<span class="fa-stack fa-lg">

<i class="fas fa-circle fa-stack-2x"></i>

<i class="fa-brands fa-x-twitter fa-stack-1x fa-inverse"></i>

</span>

</a>

</li>

<li class="list-inline-item">

<a href="https://www.facebook.com/legophil101" target="_blank" rel="noopener noreferrer">

<span class="fa-stack fa-lg">

<i class="fas fa-circle fa-stack-2x"></i>

<i class="fa-brands fa-facebook-f fa-stack-1x fa-inverse"></i>

</span>

</a>

</li>

<li class="list-inline-item">

<a href="https://github.com/legophil101" target="_blank" rel="noopener noreferrer">

<span class="fa-stack fa-lg">

<i class="fas fa-circle fa-stack-2x"></i>

<i class="fa-brands fa-github fa-stack-1x fa-inverse"></i>

</span>

</a>

</li>

</ul>

<div class="small text-center text-muted fst-italic">

&copy; <span id="currentYear"></span> — Made by Philip with ❤️ love and ☕ coffee

</div>

</div>

</div>

</div>

</footer>

    <script>
        const sessionId = "{{ session_id }}";
        const statusLabel = document.getElementById("statusLabel");

        // Fun status messages to keep the user engaged
        const statusMessages = [
            "Reading PDF text structure...",
            "Cleaning up extra spaces and noise...",
            "Slicing text into manageable chunks...",
            "Sending chunks to Microsoft Edge TTS...",
            "Parallel voice synthesis in progress...",
            "Merging audio files with FFmpeg...",
            "Finalizing your MP3 file..."
        ];

        let msgIndex = 0;
        setInterval(() => {
            if (msgIndex < statusMessages.length) {
                statusLabel.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-2"></i> ${statusMessages[msgIndex]}`;
                msgIndex++;
            }
        }, 6000);

        function checkStatus() {
            // Pings the app.py route we created earlier
            fetch(`/status/${sessionId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "completed") {
                        // Redirect back to home with success params to trigger the download UI
                        window.location.href = `/?success=true&file=${data.final_file}&jid=${data.job_id}`;
                    } else if (data.status === "error") {
                        // Redirect back to index with the error message in the URL
                        window.location.href = "/?error=" + encodeURIComponent(data.message);
                    } else {
                        // Poll every 3 seconds
                        setTimeout(checkStatus, 3000);
                    }
                })
                .catch(err => {
                    console.error("Status check failed:", err);
                    setTimeout(checkStatus, 5000);
                });
        }

        // Start polling
        checkStatus();
        document.getElementById("currentYear").textContent = new Date().getFullYear();
    </script>
</body>
</html>
